include: _default_template_yaml
task: "vstar_bench_cot"
generation_kwargs:
  max_new_tokens: 1024
  temperature: 0
  top_p: 1.0
  num_beams: 1
  do_sample: false
lmms_eval_specific_kwargs:
  default:
    pre_prompt: ""
    post_prompt: "\nPlease examine the image carefully, think step by step, and then answer with the option's letter from the given choices."
  metric_list:
  - metric: vstar_overall_acc
    aggregation: !function utils.vstar_aggregate_results
    higher_is_better: true
