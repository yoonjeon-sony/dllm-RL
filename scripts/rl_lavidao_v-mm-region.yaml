wandb:
  entity: null
  resume: 'auto'

system:
  HTTP_PROXY: null
  HF_HOME: null
  env_name: "dLLM-RL"
  envs_dir: "/home/yoonjeon.kim/.envs"
  base_dir: "/home/yoonjeon.kim/dLLM-RL"

experiment:
  project: "rl_lavidao_v-mm-region"
  function: "train"
  start_from_scratch: True
  total_step: 160
  save_every: 10
  eval_every: 5
  current_epoch: 1
  deepspeed_file: "1_node_4_gpus_deepspeed_zero2"
  num_node: 1
  node_index: 0

model:
  pretrained_model: "/group2/dgm/yoonjeon/LaViDa-O"
  optimized_name: "optimized"
  model_base: "lavidao"
  vq_model_path: null
  image_resolution: null

dataset:
  train_dataset: 
  - "ThinkMorph-Spatial_Navigation"
  - "ThinkMorph-Visual_Search"
  - "ThinkMorph-Chart_Refocus"
  # - "Math-VR-train"
  optimization_data: "rl_data"
  data_type: "mmu"
  image_root: "/group2/dgm/yoonjeon/data"


rollout:
  num_task_per_step: 128
  num_response_per_task: 8
  temperature: 0.8
  steps: 512
  max_gen_length: 1024
  batch_size: 1
  remasking_strategy: "low_confidence_dynamic"
  target: "confidence"
  dynamic_threshold: 0.90
  block_size: 32
  further_horizon: 128
  use_cache: True
  # Interleaved generation settings (image + text)
  use_interleaved: True  # Set to True to enable interleaved generation
  interleaved:
    mode: "interleaved_region"  # "interleaved" or "interleaved_region"
    do_plan: False  # Whether to generate a planning step first
    conf_policy: "mmada"  # Confidence policy: "mmada", "mask_git", "stratified"
    enable_stratified: False
    edit_mode: 0  # 0, 1, 2, 3 -> different unconditional types
    guidance_scale: 1.2  # CFG scale for text conditioning
    guidance_scale_image: 1.4  # CFG scale for image conditioning
    gen_visual_cue_template: "Your job is to generate a auxiliary line, box, or text to help solve the following problem."
    problem_solving_instruction: "Let's think step by step."
    rotatedDiff_key: "rotatedDiff"  # Key in data for rotated rect (for interleaved_region mode)

reward:
  answer_must_in_box: True
  strict_len_check: False

execute:
  num_chunk: 128

training:
  vision_batch_size: 32
  gradient_accumulation_steps: 128
  batch_size_lm: 1
  mixed_precision: "bf16"
  enable_tf32: True
  seed: 10086
  num_train_epochs: 1
  max_grad_norm: 1.0
  method: "random_masking" # "random_masking" "TraceRL" "coupled"
  lower_p: 0.1
  upper_p: 0.9
  shrink: 8
  post_num: 1
  mask_times_per_sample: 2
  max_gen_length: ${rollout.max_gen_length}
  max_prompt_len: 512
  eps: 0.20
  beta: 0.01
  use_kl_estimator_k3: True

optimizer:
  name: adamw
  params:
    learning_rate: 1e-6
    scale_lr: False
    beta1: 0.9
    beta2: 0.999
    weight_decay: 0.0
    epsilon: 1e-8

lr_scheduler:
  scheduler: "cosine"
  params:
    learning_rate: ${optimizer.params.learning_rate}
    warmup_steps: 0
    min_lr_scale: 1.0

evaluation:
  if_eval: True
  eval_dataset: 
  - "ThinkMorph-Spatial_Navigation"
  - "ThinkMorph-Visual_Search"
  - "ThinkMorph-Chart_Refocus"
  # - "Math-VR-train"
  data_type: "mmu"
  num_response_per_task: 3
  temperature: 0.1
  steps: 256
  max_gen_length: 256
  batch_size: 1
  remasking_strategy: ["low_confidence_static", "low_confidence_dynamic"]
  target: "confidence"
  dynamic_threshold: 0.90
  block_size: 32
  further_horizon: 128
  use_cache: True
